name: Build Diabetes Prediction EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask numpy scikit-learn pandas pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "DiabetesPredictor" --add-data "templates;templates" --add-data "static;static" --add-data "diabetes_model.pkl;." --add-data "scaler.pkl;." app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DiabetesPredictor-App
        path: dist/DiabetesPredictor.exe
        retention-days: 30
